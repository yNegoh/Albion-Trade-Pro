<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Albion Trader Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --dim: #94a3b8; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; background: transparent; border: none; color: var(--dim); text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: var(--accent); color: white; }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .page { display: none; padding: 25px; }
        .page.active { display: block; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 10px; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; }
        .lucro-ok { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--accent)">Albion Trader</h2>
        <button class="nav-item active" onclick="nav('scanner', this)">📊 Scanner Global</button>
        <button class="nav-item" onclick="nav('top', this)">💎 Top Lucros</button>
        <button class="nav-item" onclick="nav('config', this)">⚙️ Configurações</button>
    </div>

    <div class="main">
        <!-- SCANNER -->
        <div id="p-scanner" class="page active">
            <div class="filter-bar">
                <input type="text" id="fNome" placeholder="Filtrar item..." oninput="render()">
                <button onclick="buscar()" style="background:var(--accent); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold">🔄 ATUALIZAR</button>
            </div>
            <div id="status-msg" style="margin-bottom:10px; color:var(--accent)">Aguardando...</div>
            <table>
                <thead>
                    <tr><th>Item</th><th>Rota</th><th>Compra</th><th>Venda Líq</th><th>Lucro</th><th>ROI</th><th>Visto</th></tr>
                </thead>
                <tbody id="corpo"></tbody>
            </table>
        </div>

        <!-- TOP LUCROS -->
        <div id="p-top" class="page">
            <h2>💎 Itens de Elite</h2>
            <div id="corpo-top">Use o Scanner primeiro para ver os destaques.</div>
        </div>

        <!-- CONFIG -->
        <div id="p-config" class="page">
            <h2>⚙️ Configurações</h2>
            <p>Taxa atual: 6.5% (Premium)</p>
        </div>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let dadosRaw = [];

        function nav(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active');
        }

        async function buscar() {
            const st = document.getElementById('status-msg');
            st.innerText = "⏳ Buscando no servidor... pode levar 20s.";
            try {
                const r = await fetch(API);
                dadosRaw = await r.json();
                st.innerText = `✅ ${dadosRaw.length} oportunidades encontradas!`;
                render();
            } catch (e) {
                st.innerText = "❌ Erro ao conectar. Tente novamente.";
            }
        }

        function render() {
            const busca = document.getElementById('fNome').value.toLowerCase();
            const corpo = document.getElementById('corpo');
            corpo.innerHTML = "";

            const filtrados = dadosRaw.filter(d => d.nome.toLowerCase().includes(busca));
            
            filtrados.forEach(d => {
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${d.nome}</strong></td>
                        <td>${d.origem} ➔ ${d.destino}</td>
                        <td>${d.compra.toLocaleString()}</td>
                        <td>${d.venda.toLocaleString()}</td>
                        <td class="lucro-ok">+ ${d.lucro.toLocaleString()}</td>
                        <td>${d.roi}</td>
                        <td style="color:var(--dim); font-size:0.8rem">${new Date(d.atualizado).toLocaleTimeString()}</td>
                    </tr>
                `;
            });

            // Preenche aba Top
            const topArea = document.getElementById('corpo-top');
            const tops = filtrados.filter(f => parseFloat(f.roi) > 20).slice(0,5);
            topArea.innerHTML = tops.map(t => `<p>🔥 <b>${t.nome}</b>: ROI de ${t.roi}</p>`).join('');
        }

        window.onload = buscar;
    </script>
</body>
</html>
