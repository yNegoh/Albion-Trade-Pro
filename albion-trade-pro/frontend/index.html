<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Albion Trader Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --text: #f8fafc; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .nav-item:hover { background: #334155; color: white; }
        .nav-item.active { background: var(--accent); color: white; }

        /* Main */
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .page { display: none; padding: 25px; }
        .page.active { display: block; }

        /* Estilos da Tabela e Filtros */
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 10px; flex-wrap: wrap; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--accent); text-transform: uppercase; font-size: 0.75rem; }
        .lucro-verde { color: var(--accent); font-weight: bold; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--accent)">Albion Trader</h2>
        <button class="nav-item active" onclick="showPage('scanner', this)">📊 Scanner Global</button>
        <button class="nav-item" onclick="showPage('top', this)">💎 Top Lucros</button>
        <button class="nav-item" onclick="showPage('config', this)">⚙️ Configurações</button>
    </div>

    <div class="main">
        <!-- TELA: SCANNER -->
        <div id="page-scanner" class="page active">
            <div class="filter-bar">
                <input type="text" id="searchNome" placeholder="Buscar item..." oninput="filtrar()">
                <select id="selectOrigem" onchange="filtrar()"><option value="">Toda Origem</option></select>
                <select id="selectDestino" onchange="filtrar()"><option value="">Todo Destino</option></select>
                <button class="btn-main" onclick="carregar()">🔄 ATUALIZAR</button>
            </div>
            <div id="status">Aguardando atualização...</div>
            <table id="tabela">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Rota</th>
                        <th>Compra</th>
                        <th>Venda (Líq)</th>
                        <th>Lucro</th>
                        <th>ROI</th>
                        <th>Visto</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>

        <!-- TELA: TOP LUCROS -->
        <div id="page-top" class="page">
            <h1>💎 Maiores Oportunidades</h1>
            <p>Aqui você vê apenas itens com ROI acima de 15%.</p>
            <div id="corpo-top"></div>
        </div>

        <!-- TELA: CONFIGURAÇÕES -->
        <div id="page-config" class="page">
            <h1>⚙️ Configurações</h1>
            <p>Ajuste suas preferências de trader.</p>
            <label>Sua Taxa de Mercado: <input type="text" value="6.5%" disabled></label>
        </div>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let todosDados = [];

        // FUNÇÃO DOS BOTÕES DA SIDEBAR
        function showPage(pageId, element) {
            // Esconde todas as páginas
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Desativa todos os botões
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            
            // Mostra a página certa e ativa o botão
            document.getElementById('page-' + pageId).classList.add('active');
            element.classList.add('active');
        }

        async function carregar() {
            const status = document.getElementById('status');
            status.innerText = "⏳ Buscando preços reais no Albion...";
            try {
                const r = await fetch(API);
                todosDados = await r.json();
                status.innerText = `✅ ${todosDados.length} itens encontrados.`;
                popularCidades();
                filtrar();
            } catch (e) {
                status.innerText = "❌ Erro ao conectar.";
            }
        }

        function popularCidades() {
            const cidades = [...new Set(todosDados.map(d => d.origem))].sort();
            const sO = document.getElementById('selectOrigem');
            const sD = document.getElementById('selectDestino');
            sO.innerHTML = '<option value="">Toda Origem</option>';
            sD.innerHTML = '<option value="">Todo Destino</option>';
            cidades.forEach(c => {
                sO.innerHTML += `<option value="${c}">${c}</option>`;
                sD.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function filtrar() {
            const busca = document.getElementById('searchNome').value.toLowerCase();
            const org = document.getElementById('selectOrigem').value;
            const dest = document.getElementById('selectDestino').value;
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";

            const filtrados = todosDados.filter(d => {
                return d.nome.toLowerCase().includes(busca) && 
                       (org === "" || d.origem === org) &&
                       (dest === "" || d.destino === dest);
            });

            filtrados.forEach(d => {
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${d.nome}</strong></td>
                        <td>${d.origem} ➔ ${d.destino}</td>
                        <td>${d.compra.toLocaleString()}</td>
                        <td>${d.venda.toLocaleString()}</td>
                        <td class="lucro-verde">+ ${d.lucro.toLocaleString()}</td>
                        <td>${d.roi}</td>
                        <td style="color:#94a3b8; font-size:0.8rem">${new Date(d.atualizado).toLocaleTimeString()}</td>
                    </tr>
                `;
            });
        }

        window.onload = carregar;
    </script>
</body>
</html>
