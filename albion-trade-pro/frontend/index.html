<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Albion Trader</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: #22c55e; color: white; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .page { display: none; }
        .page.active { display: block; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        th { color: var(--accent); text-transform: uppercase; font-size: 0.7rem; }
        .lucro { color: var(--accent); font-weight: bold; }
        input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; width: 250px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--accent)">Albion Trader</h2>
        <button class="nav-item active" onclick="nav('scanner', this)">📊 Scanner Global</button>
        <button class="nav-item" onclick="nav('top', this)">💎 Top Lucros</button>
        <button class="nav-item" onclick="nav('config', this)">⚙️ Configurações</button>
    </div>

    <div class="main">
        <div id="p-scanner" class="page active">
            <input type="text" id="fNome" placeholder="Filtrar item..." oninput="render()">
            <button onclick="buscar()" style="padding:10px; background:var(--accent); border:none; color:white; border-radius:5px; cursor:pointer; font-weight:bold">🔄 ATUALIZAR</button>
            <div id="msg" style="margin: 10px 0; color: var(--accent)">Aguardando...</div>
            <table>
                <thead>
                    <tr><th>Item</th><th>Rota</th><th>Compra</th><th>Venda Líq</th><th>Lucro</th><th>ROI</th><th>Visto</th></tr>
                </thead>
                <tbody id="corpo"></tbody>
            </table>
        </div>

        <div id="p-top" class="page"><h2>💎 Maiores Oportunidades</h2><div id="top-list"></div></div>
        <div id="p-config" class="page"><h2>⚙️ Configurações</h2><p>Taxa: 6.5% (Premium)</p></div>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let dados = [];

        function nav(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            btn.classList.add('active');
        }

        async function buscar() {
            const m = document.getElementById('msg');
            m.innerText = "⏳ Buscando dados...";
            try {
                const r = await fetch(API);
                dados = await r.json();
                m.innerText = `✅ ${dados.length} itens encontrados!`;
                render();
            } catch (e) { m.innerText = "❌ Erro ao carregar."; }
        }

        function render() {
            const busca = document.getElementById('fNome').value.toLowerCase();
            const t = document.getElementById('corpo');
            let html = ""; // Usando string completa (muito mais rápido)

            const filtrados = dados.filter(d => d.n.toLowerCase().includes(busca));

            filtrados.slice(0, 50).forEach(d => {
                const tempo = Math.floor((Date.now() - new Date(d.t)) / 60000);
                html += `<tr>
                    <td><b>${d.n}</b></td>
                    <td>${d.o} ➔ ${d.d}</td>
                    <td>${d.c.toLocaleString()}</td>
                    <td>${d.v.toLocaleString()}</td>
                    <td class="lucro">+ ${d.l.toLocaleString()}</td>
                    <td>${d.r}%</td>
                    <td style="color:#94a3b8">${tempo < 60 ? tempo+'m' : Math.floor(tempo/60)+'h'}</td>
                </tr>`;
            });
            t.innerHTML = html;
        }

        window.onload = buscar;
    </script>
</body>
</html>
