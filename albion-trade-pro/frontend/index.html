<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  margin-bottom:20px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* TOP BAR */
.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.topbar input {
  padding:6px;
  margin-left:5px;
}

/* FILTROS */
.filters input, .filters select {
  padding:8px;
  margin:5px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
}

th, td {
  padding:10px;
  text-align:center;
}

th {
  background:#1e293b;
}

tr:hover {
  background:#1e293b;
}

.lucro {
  color:#22c55e;
  font-weight:bold;
}

.premium {
  background:#f59e0b;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="sidebar">
  <h2>Albion Trade</h2>

  <button onclick="buscar()">📊 Mercado</button>
  <button onclick="virarPremium()" class="premium">💎 Premium</button>
</div>

<!-- CONTEUDO -->
<div class="main">

  <!-- TOPO -->
  <div class="topbar">
    <div>
      <input id="search" placeholder="Buscar item">
      <select id="buyCity"></select>
      <select id="sellCity"></select>
      <input id="qty" type="number" value="1" min="1">
    </div>

    <div>
      <input id="user" placeholder="Usuário">
      <input id="pass" type="password" placeholder="Senha">
      <button onclick="login()">Login</button>
      <button onclick="register()">Cadastrar</button>
    </div>
  </div>

  <!-- TABELA -->
  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Compra</th>
        <th>Venda</th>
        <th>Preço Compra</th>
        <th>Preço Venda</th>
        <th>Lucro</th>
        <th>Total</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";
let token = localStorage.getItem("token") || "";
let dados = [];

// LOGIN
async function login(){
  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  if(res.status !== 200){
    alert("Erro login");
    return;
  }

  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);

  alert("Logado como "+data.plan);
}

// CADASTRO
async function register(){
  await fetch(API+"/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });

  alert("Criado!");
}

// FORMATAR NUMERO
function format(n){
  return n.toLocaleString("pt-BR");
}

// FORMATAR ITEM
function formatItem(item){

  let tier = item.match(/T(\d)/)[1];
  let enchant = item.includes("@") ? "." + item.split("@")[1] : "";

  let base = item.split("_").slice(1).join("_");

  const nomes = {
    BAG:"Bolsa",
    CAPE:"Capa",
    ORE:"Minério",
    WOOD:"Madeira",
    STONE:"Pedra",
    FIBER:"Fibra",
    HIDE:"Couro"
  };

  return `${nomes[base] || base} ${tier}${enchant}`;
}

// CIDADES FIXAS
const cidades = [
  "Bridgewatch","Martlock","Lymhurst",
  "Fort Sterling","Thetford","Caerleon","Black Market"
];

// PREENCHER
function preencherCidades(){
  buyCity.innerHTML = `<option value="">Compra</option>` +
    cidades.map(c=>`<option>${c}</option>`).join("");

  sellCity.innerHTML = `<option value="">Venda</option>` +
    cidades.map(c=>`<option>${c}</option>`).join("");
}

// BUSCAR
async function buscar(){

  if(!token){
    alert("Faça login");
    return;
  }

  const res = await fetch(API+"/scanner",{
    headers:{Authorization:token}
  });

  dados = await res.json();

  preencherCidades();
  render();
}

// RENDER
function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const buy = buyCity.value;
  const sell = sellCity.value;
  const qty = parseInt(qtyInput.value) || 1;

  tabela.innerHTML = "";

  let filtrado = dados.filter(i =>
    i.item.toLowerCase().includes(search) &&
    (!buy || i.buyCity === buy) &&
    (!sell || i.sellCity === sell)
  );

  filtrado.forEach(i => {

    const total = i.lucro * qty;

    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${format(i.buyPrice)}</td>
      <td>${format(i.sellPrice)}</td>
      <td class="lucro">${format(i.lucro)}</td>
      <td class="lucro">${format(total)}</td>
    </tr>`;
  });
}

// PREMIUM
function virarPremium(){
  alert("Integração com Hotmart aqui");
}

// EVENTOS
search.addEventListener("input", render);
buyCity.addEventListener("change", render);
sellCity.addEventListener("change", render);
qtyInput.addEventListener("input", render);

// INIT
const qtyInput = document.getElementById("qty");

if(token){
  preencherCidades();
  buscar();
}

</script>

</body>
</html>
