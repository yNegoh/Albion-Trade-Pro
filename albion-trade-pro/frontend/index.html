<!-- Mesma estrutura de estilos anterior, apenas o corpo da tabela e script mudaram -->
<!-- ... (Mantenha o CSS anterior se preferir, ou use este atualizado abaixo) ... -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>ALLBion Traders Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 220px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .main { flex: 1; overflow-y: auto; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 8px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--accent); font-size: 0.8rem; }
        .lucro { color: var(--accent); font-weight: bold; }
        .time { color: #94a3b8; font-size: 0.75rem; }
        .btn { background: var(--accent); color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar"><h2>ALLBion Trade</h2><p>Filtros Automáticos .1 .2 .3</p></div>
    <div class="main">
        <div style="margin-bottom: 20px;">
            <input type="text" id="search" placeholder="Buscar item..." oninput="render()" style="padding:10px; background:#1e293b; color:white; border:1px solid #334155">
            <button class="btn" onclick="carregar()">🔄 Atualizar Agora</button>
        </div>
        <div id="loading" style="display:none">Buscando oportunidades reais...</div>
        <table id="tabela">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Rota</th>
                    <th>Compra</th>
                    <th>Venda (Líq)</th>
                    <th>Lucro</th>
                    <th>ROI</th>
                    <th>Visto há</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        const API_URL = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let dados = [];

        async function carregar() {
            document.getElementById('loading').style.display = 'block';
            try {
                const r = await fetch(API_URL);
                dados = await r.json();
                render();
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function formatTime(dateStr) {
            const diff = Math.floor((new Date() - new Date(dateStr)) / 60000);
            if (diff < 60) return `${diff} min`;
            return `${Math.floor(diff/60)}h ${diff%60}m`;
        }

        function render() {
            const busca = document.getElementById('search').value.toLowerCase();
            const corpo = document.getElementById('corpo');
            corpo.innerHTML = "";

            dados.filter(d => d.nome.toLowerCase().includes(busca)).forEach(d => {
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${d.nome}</strong></td>
                        <td>${d.origem} ➔ ${d.destino}</td>
                        <td>${d.compra.toLocaleString()}</td>
                        <td>${d.venda.toLocaleString()}</td>
                        <td class="lucro">+ ${d.lucro.toLocaleString()}</td>
                        <td>${d.roi}</td>
                        <td class="time">${formatTime(d.atualizado)}</td>
                    </tr>
                `;
            });
        }
        window.onload = carregar;
    </script>
</body>
</html>
