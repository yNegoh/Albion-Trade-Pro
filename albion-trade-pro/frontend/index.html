<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.container { padding:20px; }

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

th { background:#1e293b; }

select, input {
  width:100%;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
}

.lucro { color:#22c55e; }
</style>
</head>

<body>

<div class="container">

<h2>Albion Trade Pro</h2>

<button onclick="buscar()">Atualizar</button>

<table>

<thead>
<tr>

<th>
Item<br>
<input id="fItem" placeholder="Buscar...">
</th>

<th>
Categoria<br>
<select id="fCategoria"></select>
</th>

<th>
Compra<br>
<select id="fCompra"></select>
</th>

<th>
Venda<br>
<select id="fVenda"></select>
</th>

<th onclick="ordenar('lucro')">Lucro ⬍</th>
<th onclick="ordenar('volume')">Volume ⬍</th>
<th onclick="ordenar('score')">Score ⬍</th>

</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let filtrado = [];

const fItem = document.getElementById("fItem");
const fCategoria = document.getElementById("fCategoria");
const fCompra = document.getElementById("fCompra");
const fVenda = document.getElementById("fVenda");
const tabela = document.getElementById("tabela");

// 🔥 EVENTOS
fItem.addEventListener("input", filtrar);
fCategoria.addEventListener("change", filtrar);
fCompra.addEventListener("change", filtrar);
fVenda.addEventListener("change", filtrar);

// 🔥 BUSCAR DADOS
async function buscar(){
  try {
    const res = await fetch(API + "/scanner");
    dados = await res.json();

    if (!dados.length) {
      alert("Nenhum dado recebido da API");
      return;
    }

    popularFiltros();
    filtrado = [...dados];
    render();

  } catch (err) {
    console.error(err);
    alert("Erro ao conectar na API");
  }
}

// 🔥 POPULAR FILTROS
function popularFiltros(){

  function setOptions(select, valores){
    select.innerHTML = '<option value="">Todos</option>';
    valores.forEach(v=>{
      if(v) select.innerHTML += `<option value="${v}">${v}</option>`;
    });
  }

  const categorias = [...new Set(dados.map(i=>i.category))].sort();
  const compras = [...new Set(dados.map(i=>i.buyCity))].sort();
  const vendas = [...new Set(dados.map(i=>i.sellCity))].sort();

  setOptions(fCategoria, categorias);
  setOptions(fCompra, compras);
  setOptions(fVenda, vendas);
}

// 🔥 FILTRO
function filtrar(){

  const item = fItem.value.toLowerCase();
  const cat = fCategoria.value;
  const compra = fCompra.value;
  const venda = fVenda.value;

  filtrado = dados.filter(i =>

    i.name.toLowerCase().includes(item) &&
    (!cat || i.category === cat) &&
    (!compra || i.buyCity === compra) &&
    (!venda || i.sellCity === venda)

  );

  render();
}

// 🔥 RENDER
function render(){

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${i.name}</td>
      <td>${i.category}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td class="lucro">${i.lucro.toLocaleString()}</td>
      <td>${i.volume}</td>
      <td>${i.score}</td>
    </tr>`;
  });
}

// 🔥 ORDENAÇÃO
let asc = false;

function ordenar(campo){

  asc = !asc;

  filtrado.sort((a,b)=>{
    return asc
      ? a[campo] - b[campo]
      : b[campo] - a[campo];
  });

  render();
}

// 🚀 INICIAR
buscar();

</script>

</body>
</html>
