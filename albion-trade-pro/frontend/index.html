<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
  height:100vh;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:15px;
}

.cards {
  display:flex;
  gap:10px;
}

.card {
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.filters input, .filters select {
  padding:8px;
  margin:5px;
}

table {
  width:100%;
  margin-top:10px;
}

th, td {
  padding:10px;
  text-align:center;
}

th {
  background:#1e293b;
}

tr:hover {
  background:#1e293b;
}

.lucro {
  color:#22c55e;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Albion Trade</h2>
  <button onclick="buscar()">Atualizar</button>
</div>

<div class="main">

<h3>Mercado</h3>

<div class="cards">
  <div class="card" onclick="setOrder('lucro')">🔥 Top Lucro</div>
  <div class="card" onclick="setOrder('volume')">📦 Mais Vendidos</div>
  <div class="card" onclick="setOrder('score')">🧠 Melhor Score</div>
</div>

<div class="filters">
  <input id="search" placeholder="Buscar item">
  <select id="buyCity"></select>
  <select id="sellCity"></select>
  <input id="qty" type="number" value="1">
</div>

<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Preço Compra</th>
<th>Preço Venda</th>
<th>Lucro</th>
<th>Total</th>
<th>Volume</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let ordem = "score";

// FORMAT
function format(n){ return n.toLocaleString("pt-BR"); }

// ITEM
function formatItem(item){
  let tier = item.match(/T(\d)/)[1];
  let base = item.split("_").slice(1).join("_");
  return base + " T" + tier;
}

// CIDADES
const cidades = ["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

function preencherCidades(){
  buyCity.innerHTML = `<option value="">Compra</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
  sellCity.innerHTML = `<option value="">Venda</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
}

// BUSCAR
async function buscar(){

  console.log("Buscando...");

  const res = await fetch(API+"/scanner");
  dados = await res.json();

  console.log("Dados:", dados.length);

  preencherCidades();
  render();
}

// ORDENAR
function setOrder(tipo){
  ordem = tipo;
  render();
}

// RENDER
function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const buy = buyCity.value;
  const sell = sellCity.value;
  const qty = parseInt(document.getElementById("qty").value) || 1;

  let filtrado = dados.filter(i =>
    i.item.toLowerCase().includes(search) &&
    (!buy || i.buyCity === buy) &&
    (!sell || i.sellCity === sell)
  );

  filtrado.sort((a,b)=>{
    if(ordem === "lucro") return b.lucro - a.lucro;
    if(ordem === "volume") return b.volume - a.volume;
    if(ordem === "score") return b.score - a.score;
  });

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${format(i.buyPrice)}</td>
      <td>${format(i.sellPrice)}</td>
      <td class="lucro">${format(i.lucro)}</td>
      <td class="lucro">${format(i.lucro * qty)}</td>
      <td>${format(i.volume)}</td>
      <td>${format(i.score)}</td>
    </tr>`;
  });
}

// INIT
window.onload = buscar;

</script>

</body>
</html>
