<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
.container { padding:20px; }

input, select {
  padding:8px;
  margin:5px;
}

table {
  width:100%;
  margin-top:10px;
}

th, td {
  padding:10px;
  text-align:center;
}

th { background:#1e293b; }
.lucro { color:#22c55e; }
</style>
</head>

<body>

<div class="container">

<h2>Albion Trade Pro</h2>

<input id="search" placeholder="Buscar item">
<select id="categoryFilter">
  <option value="">Categoria</option>
  <option>Arma</option>
  <option>Armadura</option>
  <option>Recurso</option>
  <option>Consumível</option>
  <option>Utilidade</option>
</select>

<button onclick="buscar()">Atualizar</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Categoria</th>
<th>Compra</th>
<th>Venda</th>
<th>Lucro</th>
<th>Volume</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];

async function buscar(){
  const res = await fetch(API+"/scanner");
  dados = await res.json();
  render();
}

function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const category = document.getElementById("categoryFilter").value;

  let filtrado = dados.filter(i =>
    i.name.toLowerCase().includes(search) &&
    (!category || i.category === category)
  );

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${i.name}</td>
      <td>${i.category}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td class="lucro">${i.lucro.toLocaleString()}</td>
      <td>${i.volume}</td>
      <td>${i.score}</td>
    </tr>`;
  });
}

buscar();

</script>

</body>
</html>
