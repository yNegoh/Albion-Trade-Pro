<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Albion Trader Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: #22c55e; color: white; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 10px; }
        select, input { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: var(--accent); text-transform: uppercase; font-size: 0.7rem; }
        .lucro { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent)">Albion Trader</h2>
        <p style="font-size:0.7rem; color:gray">CATEGORIAS</p>
        <button class="nav-item active" onclick="mudarCat('equip', this)">⚔️ Equipamentos</button>
        <button class="nav-item" onclick="mudarCat('recurso', this)">🪵 Recursos (Refino)</button>
        <button class="nav-item" onclick="mudarCat('comida', this)">🥧 Comida/Poção</button>
        <button class="nav-item" onclick="mudarCat('craft', this)">🛠️ Craft (Bolsas/Capas)</button>
        <hr style="border:0; border-top:1px solid #334155; margin:15px 0">
        <button class="nav-item" onclick="mudarCat('top', this)">🏆 TOP LUCROS</button>
    </div>

    <div class="main">
        <div class="filter-bar">
            <select id="selOrigem" onchange="render()"><option value="">Cidade Compra: Todas</option></select>
            <select id="selDestino" onchange="render()"><option value="">Cidade Venda: Todas</option></select>
            <input type="text" id="fBusca" placeholder="Filtrar item..." oninput="render()">
        </div>
        <div id="msg" style="color:var(--accent); font-weight:bold; margin-bottom:10px">Selecione uma categoria...</div>
        <table id="tabela">
            <thead>
                <tr><th>Item</th><th>Origem</th><th>Destino</th><th>Compra</th><th>Venda Líq</th><th>Lucro</th><th>ROI</th></tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let dados = [];
        let catAtual = 'equip';

        async function mudarCat(cat, btn) {
            catAtual = cat;
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const m = document.getElementById('msg');
            m.innerText = `⏳ Carregando ${cat}...`;
            
            try {
                const r = await fetch(`${API}?cat=${cat}`);
                dados = await r.json();
                m.innerText = `✅ ${dados.length} itens encontrados em ${cat}`;
                popularCidades();
                render();
            } catch (e) { m.innerText = "❌ Erro ao carregar categoria."; }
        }

        function popularCidades() {
            const cidades = ["Caerleon", "Martlock", "Bridgewatch", "Lymhurst", "FortSterling", "Thetford"];
            const sO = document.getElementById('selOrigem');
            const sD = document.getElementById('selDestino');
            sO.innerHTML = '<option value="">Cidade Compra: Todas</option>';
            sD.innerHTML = '<option value="">Cidade Venda: Todas</option>';
            cidades.forEach(c => {
                sO.innerHTML += `<option value="${c}">${c}</option>`;
                sD.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function render() {
            const busca = document.getElementById('fBusca').value.toLowerCase();
            const org = document.getElementById('selOrigem').value;
            const dest = document.getElementById('selDestino').value;
            const corpo = document.getElementById('corpo');
            let html = "";

            dados.filter(d => {
                return d.n.toLowerCase().includes(busca) && 
                       (org === "" || d.o.includes(org)) &&
                       (dest === "" || d.d.includes(dest));
            }).forEach(d => {
                html += `<tr>
                    <td><b>${d.n}</b></td>
                    <td>${d.o}</td>
                    <td>${d.d}</td>
                    <td>${d.c.toLocaleString()}</td>
                    <td>${d.v.toLocaleString()}</td>
                    <td class="lucro">+ ${d.l.toLocaleString()}</td>
                    <td style="background:rgba(34,197,94,0.1); font-weight:bold">${d.r}%</td>
                </tr>`;
            });
            corpo.innerHTML = html;
        }

        window.onload = () => mudarCat('equip', document.querySelector('.nav-item'));
    </script>
</body>
</html>
