<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Albion Trader Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        .sidebar { width: 240px; background: #1e293b; padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: #22c55e; color: white; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; background: #1e293b; padding: 15px; border-radius: 10px; }
        input, select { background: #0f172a; color: white; border: 1px solid #334155; padding: 10px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #22c55e; font-size: 0.8rem; }
        .lucro { color: #22c55e; font-weight: bold; }
        #status-msg { padding: 10px; color: #22c55e; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:#22c55e">Albion Trader</h2>
        <button class="nav-item active">📊 Scanner Global</button>
        <button class="nav-item">💎 Top Lucros</button>
        <button class="nav-item">⚙️ Configurações</button>
    </div>
    <div class="main">
        <div class="filter-bar">
            <input type="text" id="inNome" placeholder="Buscar item..." oninput="render()">
            <input type="number" id="inRoi" placeholder="ROI Min %" oninput="render()" style="width: 80px;">
            <button onclick="carregar()" style="background:#22c55e; border:none; color:white; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold">🔄 ATUALIZAR</button>
        </div>
        
        <div id="status-msg">Aguardando comando...</div>

        <table id="tabela" style="display:none">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Rota</th>
                    <th>Compra</th>
                    <th>Venda (Líq)</th>
                    <th>Lucro</th>
                    <th>ROI</th>
                    <th>Visto</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        let dados = [];

        async function carregar() {
            const msg = document.getElementById('status-msg');
            msg.innerText = "⏳ Buscando dados reais (Aguarde 15s)...";
            try {
                const r = await fetch(API);
                dados = await r.json();
                if (dados.length === 0) {
                    msg.innerText = "⚠️ Nenhum item com lucro encontrado no momento.";
                } else {
                    msg.innerText = `✅ ${dados.length} oportunidades encontradas!`;
                    document.getElementById('tabela').style.display = "table";
                    render();
                }
            } catch (e) {
                msg.innerText = "❌ Erro: O backend está fora do ar ou demorou demais.";
            }
        }

        function formatTime(dateStr) {
            const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
            return diff < 60 ? diff + "m" : Math.floor(diff/60) + "h";
        }

        function render() {
            const nome = document.getElementById('inNome').value.toLowerCase();
            const roiMin = parseFloat(document.getElementById('inRoi').value) || 0;
            const corpo = document.getElementById('corpo');
            corpo.innerHTML = "";

            const filtrados = dados.filter(d => {
                const bateNome = d.nome.toLowerCase().includes(nome);
                const bateRoi = parseFloat(d.roi) >= roiMin;
                return bateNome && bateRoi;
            });

            filtrados.forEach(d => {
                corpo.innerHTML += `
                    <tr>
                        <td><strong>${d.nome}</strong></td>
                        <td>${d.origem} ➔ ${d.destino}</td>
                        <td>${d.compra.toLocaleString()}</td>
                        <td>${d.venda.toLocaleString()}</td>
                        <td class="lucro">+ ${d.lucro.toLocaleString()}</td>
                        <td>${d.roi}</td>
                        <td style="color:#94a3b8; font-size:0.8rem">${formatTime(d.atualizado)}</td>
                    </tr>
                `;
            });
        }
        
        // Carrega automático ao abrir
        window.onload = carregar;
    </script>
</body>
</html>
