<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Albion Trader Pro</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --dim: #94a3b8; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 240px; background: var(--card); padding: 20px; border-right: 1px solid #334155; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 5px; border-radius: 8px; background: transparent; border: none; color: var(--dim); text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: #22c55e; color: white; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .premium-toggle { display: flex; align-items: center; gap: 10px; background: #0f172a; padding: 8px 15px; border-radius: 20px; border: 1px solid #fbbf24; cursor: pointer; }
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; }
        select { background: var(--card); color: white; border: 1px solid #334155; padding: 8px; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { color: #22c55e; font-size: 0.7rem; text-transform: uppercase; }
        .item-box { display: flex; align-items: center; gap: 10px; }
        .item-img { width: 40px; height: 40px; border-radius: 4px; background: #0f172a; }
        .lucro-ok { color: #22c55e; font-weight: bold; }
        .q-label { font-size: 0.7rem; color: #fbbf24; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2 style="color:var(--accent)">Albion Trader</h2>
        <button class="nav-item active" onclick="mudarCat('equip', this)">⚔️ Equipamentos</button>
        <button class="nav-item" onclick="mudarCat('recurso', this)">🪵 Recursos</button>
        <button class="nav-item" onclick="mudarCat('comida', this)">🥧 Comida/Poção</button>
        <button class="nav-item" onclick="mudarCat('craft', this)">🛠️ Craft</button>
    </div>

    <div class="main">
        <div class="top-bar">
            <div id="msg">✅ Receitas Reais Ativadas</div>
            <div class="premium-toggle" onclick="togglePremium()">
                <input type="checkbox" id="checkPre" checked>
                <span style="color:#fbbf24; font-weight:bold; font-size:0.8rem">👑 STATUS PREMIUM</span>
            </div>
        </div>

        <div class="filter-bar">
            <select id="selO" onchange="render()"><option value="">Cidade Compra: Todas</option></select>
            <select id="selD" onchange="render()"><option value="">Cidade Venda: Todas</option></select>
            <button onclick="mudarCat(ultimaCat)" style="background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold; align-self: flex-end;">🔄 ATUALIZAR</button>
        </div>
        
        <table>
            <thead>
                <tr><th>Item</th><th>Origem (Qtd)</th><th>Destino</th><th>Custo Total</th><th>Venda Líq</th><th>Lucro</th><th>ROI</th><th>Visto</th></tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        // AJUSTE: Notável -> Excepcional
        const Q_MAP = { 1: "Normal", 2: "Bom", 3: "Excepcional", 4: "Excelente" };
        let dados = [];
        let ultimaCat = 'equip';
        let premium = true;

        function togglePremium() { premium = !premium; document.getElementById('checkPre').checked = premium; render(); }

        async function mudarCat(cat, btn) {
            ultimaCat = cat;
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            const m = document.getElementById('msg');
            m.innerText = "⏳ Calculando receitas reais...";
            try {
                const r = await fetch(`${API}?cat=${cat}`);
                dados = await r.json();
                m.innerText = `✅ ${dados.length} oportunidades em ${cat}`;
                popularCidades();
                render();
            } catch (e) { m.innerText = "❌ Erro de conexão."; }
        }

        function popularCidades() {
            const cidades = ["Martlock", "Lymhurst", "Bridgewatch", "FortSterling", "Thetford", "Caerleon"];
            const sO = document.getElementById('selO');
            const sD = document.getElementById('selD');
            sO.innerHTML = sD.innerHTML = '<option value="">Todas</option>';
            cidades.forEach(c => {
                sO.innerHTML += `<option value="${c}">${c}</option>`;
                sD.innerHTML += `<option value="${c}">${c}</option>`;
            });
        }

        function render() {
            const org = document.getElementById('selO').value;
            const dest = document.getElementById('selD').value;
            const taxa = premium ? 0.065 : 0.105;
            const corpo = document.getElementById('corpo');
            let html = "";

            dados.filter(d => {
                const oF = d.o.replace("Material em ", "");
                const dF = d.d.replace("Venda em ", "");
                return (org === "" || oF.includes(org)) && (dest === "" || dF.includes(dest));
            }).forEach(d => {
                const vLiq = Math.round(d.v * (1 - taxa));
                const lucro = vLiq - d.c;
                const roi = ((lucro / d.c) * 100).toFixed(1);
                const diff = d.t ? Math.floor((Date.now() - new Date(d.t)) / 60000) : 0;
                const tempoStr = diff < 60 ? (diff < 0 ? 0 : diff) + 'm' : Math.floor(diff/60) + 'h';

                html += `<tr>
                    <td>
                        <div class="item-box">
                            <img class="item-img" src="https://render.albiononline.com/v1/item/${d.id}.png?quality=${d.q}">
                            <div><b>${d.n}</b><br><span class="q-label">${Q_MAP[d.q]}</span></div>
                        </div>
                    </td>
                    <td><small>${d.o}</small></td>
                    <td><small>${d.d}</small></td>
                    <td>${d.c.toLocaleString()}</td>
                    <td>${vLiq.toLocaleString()}</td>
                    <td class="lucro-ok">+ ${lucro.toLocaleString()}</td>
                    <td>${roi}%</td>
                    <td style="color:var(--dim); font-size:0.8rem">${tempoStr}</td>
                </tr>`;
            });
            corpo.innerHTML = html;
        }
        window.onload = () => mudarCat('equip');
    </script>
</body>
</html>
