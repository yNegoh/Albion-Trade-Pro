<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
  height:100vh;
}

.sidebar h2 {
  margin-bottom:20px;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
}

.sidebar button:hover {
  background:#334155;
}

/* MAIN */
.main {
  flex:1;
  padding:15px;
}

/* TOPBAR */
.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

/* CARDS */
.cards {
  display:flex;
  gap:10px;
}

.card {
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* FILTERS */
.filters input, .filters select {
  padding:8px;
  margin:5px;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

th, td {
  padding:10px;
  text-align:center;
}

th {
  background:#1e293b;
}

tr:hover {
  background:#1e293b;
}

.lucro {
  color:#22c55e;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Albion Trade</h2>

  <button onclick="showPage('mercado')">📊 Mercado</button>
  <button onclick="showPage('favoritos')">⭐ Favoritos</button>
  <button onclick="showPage('alertas')">🔔 Alertas</button>
  <button onclick="virarPremium()">💎 Premium</button>
</div>

<!-- MAIN -->
<div class="main">

<div id="mercado">

<!-- TOP -->
<div class="topbar">
  <div id="userInfo">Não logado</div>
</div>

<!-- CARDS -->
<div class="cards">
  <div class="card" onclick="setOrder('lucro')">
    🔥 Top Lucro
    <div id="topLucro"></div>
  </div>

  <div class="card" onclick="setOrder('volume')">
    📦 Mais Vendidos
    <div id="topVolume"></div>
  </div>

  <div class="card" onclick="setOrder('score')">
    🧠 Melhor Score
    <div id="topScore"></div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <input id="search" placeholder="Buscar item">

  <select id="buyCity"></select>
  <select id="sellCity"></select>

  <input id="qty" type="number" value="1">

  <button onclick="buscar()">Atualizar</button>
</div>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Preço Compra</th>
<th>Preço Venda</th>
<th>Lucro</th>
<th>Total</th>
<th>Volume</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<!-- OUTRAS PÁGINAS -->
<div id="favoritos" style="display:none">⭐ Em breve</div>
<div id="alertas" style="display:none">🔔 Em breve</div>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let ordem = "score";

// FORMAT
function format(n){ return n.toLocaleString("pt-BR"); }

// ITEM
function formatItem(item){
  let tier = item.match(/T(\d)/)[1];
  let enchant = item.includes("@") ? "." + item.split("@")[1] : "";
  let base = item.split("_").slice(1).join("_");

  const nomes = {
    BAG:"Bolsa",
    CAPE:"Capa",
    ORE:"Minério",
    WOOD:"Madeira",
    STONE:"Pedra"
  };

  return `${nomes[base] || base} ${tier}${enchant}`;
}

// CIDADES
const cidades = ["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

function preencherCidades(){
  buyCity.innerHTML = `<option value="">Compra</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
  sellCity.innerHTML = `<option value="">Venda</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
}

// BUSCAR
async function buscar(){

  const token = localStorage.getItem("token");

  const res = await fetch(API+"/scanner",{
    headers:{Authorization:token}
  });

  dados = await res.json();

  preencherCidades();
  render();
}

// ORDEM
function setOrder(tipo){
  ordem = tipo;
  render();
}

// RENDER
function render(){

  const search = searchInput.value.toLowerCase();
  const buy = buyCity.value;
  const sell = sellCity.value;
  const qty = parseInt(qtyInput.value) || 1;

  let filtrado = dados.filter(i =>
    i.item.toLowerCase().includes(search) &&
    (!buy || i.buyCity === buy) &&
    (!sell || i.sellCity === sell)
  );

  // ORDENAÇÃO CORRETA
  filtrado.sort((a,b)=>{
    if(ordem === "lucro") return b.lucro - a.lucro;
    if(ordem === "volume") return b.volume - a.volume;
    if(ordem === "score") return b.score - a.score;
  });

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${format(i.buyPrice)}</td>
      <td>${format(i.sellPrice)}</td>
      <td class="lucro">${format(i.lucro)}</td>
      <td class="lucro">${format(i.lucro * qty)}</td>
      <td>${format(i.volume)}</td>
      <td>${format(i.score)}</td>
    </tr>`;
  });

  // DASHBOARD
  topLucro.innerHTML = filtrado.slice(0,3).map(i=>`${formatItem(i.item)} (${format(i.lucro)})`).join("<br>");
  topVolume.innerHTML = [...filtrado].sort((a,b)=>b.volume-a.volume).slice(0,3)
    .map(i=>`${formatItem(i.item)} (${format(i.volume)})`).join("<br>");
  topScore.innerHTML = filtrado.slice(0,3)
    .map(i=>`${formatItem(i.item)} (${format(i.score)})`).join("<br>");
}

// NAVEGAÇÃO
function showPage(page){
  mercado.style.display = "none";
  favoritos.style.display = "none";
  alertas.style.display = "none";

  document.getElementById(page).style.display = "block";
}

// PREMIUM
function virarPremium(){
  window.open("LINK_HOTMART_AQUI");
}

// INIT
const searchInput = document.getElementById("search");
const qtyInput = document.getElementById("qty");

searchInput.addEventListener("input", render);
buyCity.addEventListener("change", render);
sellCity.addEventListener("change", render);
qtyInput.addEventListener("input", render);

buscar();

</script>

</body>
</html>
