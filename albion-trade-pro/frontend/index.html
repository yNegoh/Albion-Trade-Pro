<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Albion Trader Pro v1.5</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #22c55e; --gold: #fbbf24; --border: #334155; --danger: #ef4444; }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; height: 100vh; width: 100vw; }

        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); padding: 20px; border-right: 1px solid var(--border); flex-shrink: 0; }
        .nav-item { display: block; width: 100%; padding: 12px; margin-bottom: 8px; border-radius: 8px; background: transparent; border: none; color: #94a3b8; text-align: left; cursor: pointer; font-weight: bold; }
        .nav-item.active { background: var(--accent); color: white; }
        .nav-item.black-btn { border: 1px solid var(--gold); color: var(--gold); margin-top: 5px; }

        /* Main Content */
        .main { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* Barra de Ferramentas Estilo PDF */
        .top-tools { display: flex; gap: 15px; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); align-items: center; flex-wrap: wrap; }
        .tool-group { display: flex; align-items: center; gap: 8px; background: #0f172a; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); }
        .tool-group label { font-size: 0.6rem; color: var(--accent); font-weight: bold; text-transform: uppercase; }
        .tool-group input, .tool-group select { background: none; border: none; color: white; font-weight: bold; outline: none; font-size: 0.8rem; }

        /* Tabela Pro */
        .table-container { background: var(--card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1e293b; color: #94a3b8; position: sticky; top: 0; z-index: 10; font-size: 0.65rem; }
        
        /* Badges */
        .tier-badge { padding: 2px 5px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; margin-right: 5px; background: #475569; }
        .t8 { background: #5b21b6; } .t7 { background: #b91c1c; } .t6 { background: #ea580c; }
        
        .star { cursor: pointer; font-size: 1.2rem; color: #334155; transition: 0.2s; }
        .star.active { color: var(--gold); }

        .liquidez { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; }
        .liq-alta { background: #065f46; color: #34d399; } /* Vende muito */
        .liq-baixa { background: #7f1d1d; color: #f87171; } /* Vende pouco */

        .recipe-table { width: 100%; margin-top: 5px; font-size: 0.7rem; color: #94a3b8; }
        .recipe-row { display: flex; justify-content: space-between; border-bottom: 1px solid #334155; padding: 2px 0; }
        .recipe-val { color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h2 style="color:var(--accent); margin-bottom: 20px;">Trader Pro <small style="display:block; font-size: 0.6rem; color:gray">v1.5 Premium</small></h2>
            <button class="nav-item active" onclick="mudarCat('flip', this)">⚔️ Flip de Mercado</button>
            <button class="nav-item black-btn" onclick="mudarCat('black', this)">🏴 Black Market</button>
            <button class="nav-item" onclick="mudarCat('craft', this)">🛠️ Craft Geral</button>
            <button class="nav-item" onclick="mudarCat('refino', this)">🪵 Refino Recursos</button>
            
            <div style="margin-top:auto; padding: 10px; background: #0f172a; border-radius: 8px; font-size: 0.7rem;">
                <p style="color:var(--gold); font-weight:bold; margin-bottom:5px;">⭐ FAVORITOS</p>
                <div id="fav-list" style="color:gray;">Nenhum item marcado.</div>
            </div>
        </div>

        <div class="main">
            <div class="top-tools">
                <div class="tool-group"><label>Premium</label><input type="checkbox" id="checkPre" checked onchange="render()"></div>
                <div class="tool-group">
                    <label>Retorno (RRR)</label>
                    <select id="selRRR" onchange="render()">
                        <option value="0">0%</option>
                        <option value="0.152" selected>15.2%</option>
                        <option value="0.437">43.7%</option>
                    </select>
                </div>
                <div class="tool-group">
                    <label>Taxa Loja (100)</label>
                    <input type="number" id="taxaLoja" value="500" style="width:50px;" oninput="render()">
                </div>
                <input type="text" id="fNome" placeholder="🔍 Filtrar item..." oninput="render()" style="background:var(--card); border:1px solid var(--border); color:white; padding:8px; border-radius:8px; width:150px;">
                <button onclick="mudarCat(ultimaCat)" style="background:var(--accent); color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:auto;">🔄 ATUALIZAR</button>
            </div>

            <div id="status-msg" style="margin-bottom:10px; font-size: 0.8rem; font-weight:bold; color:var(--accent);">Pronto para análise.</div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>⭐</th>
                            <th>Item / Qualidade</th>
                            <th>Origem / Receita Detalhada</th>
                            <th>Destino</th>
                            <th>Custo Aquisição</th>
                            <th>Venda Líquida</th>
                            <th onclick="ordenar('lucro')" style="cursor:pointer">Lucro Silver</th>
                            <th onclick="ordenar('roi')" style="cursor:pointer; color:var(--gold)">ROI % ↓</th>
                            <th>Idade</th>
                        </tr>
                    </thead>
                    <tbody id="corpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://albion-trade-pro-ogaq.onrender.com/scanner";
        const Q_MAP = { 1: "Normal", 2: "Bom", 3: "Excepcional", 4: "Excelente" };
        let dados = [];
        let favoritos = JSON.parse(localStorage.getItem('albion_favs')) || [];
        let ultimaCat = 'flip';

        async function mudarCat(cat, btn) {
            ultimaCat = cat;
            if(btn) {
                document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            document.getElementById('status-msg').innerText = "⏳ Sincronizando com a API...";
            try {
                const r = await fetch(`${API}?cat=${cat}`);
                dados = await r.json();
                document.getElementById('status-msg').innerText = `✅ Analisadas ${dados.length} rotas.`;
                render();
            } catch (e) { document.getElementById('status-msg').innerText = "❌ Erro ao conectar."; }
        }

        function toggleFav(id) {
            if(favoritos.includes(id)) favoritos = favoritos.filter(f => f !== id);
            else favoritos.push(id);
            localStorage.setItem('albion_favs', JSON.stringify(favoritos));
            render(true);
            updateFavSidebar();
        }

        function updateFavSidebar() {
            const list = document.getElementById('fav-list');
            list.innerHTML = favoritos.length > 0 ? favoritos.slice(0, 5).join('<br>') + (favoritos.length > 5 ? '<br>...' : '') : "Nenhum marcado.";
        }

        function render(apenasTabela = false) {
            const isPre = document.getElementById('checkPre').checked;
            const rrr = parseFloat(document.getElementById('selRRR').value);
            const taxaLojaNutricao = parseInt(document.getElementById('taxaLoja').value) || 0;
            const query = document.getElementById('fNome').value.toLowerCase();
            const taxaMkt = isPre ? 0.065 : 0.105;
            
            let processados = dados.map(d => {
                // Cálculo de Taxa da Loja (Simplificado para o usuário)
                // No jogo: Valor do Item * 0.05 * (Taxa/100). 
                // Como não temos o Valor do Item base aqui, usamos um custo fixo de nutrição por tier
                const custoNutricao = (d.tier * 100) * (taxaLojaNutricao / 1000); 
                
                const c_material = (ultimaCat === 'flip' || ultimaCat === 'black' ? d.c_bruto : d.c_bruto * (1 - rrr));
                const c_final = Math.round(c_material + (ultimaCat.includes('craft') ? custoNutricao : 0));
                
                const v_liq = Math.round(d.v_bruto * (1 - taxaMkt));
                const lucro = v_liq - c_final;
                const roi = parseFloat(((lucro / c_final) * 100).toFixed(1));
                const diff = Math.floor((Date.now() - new Date(d.t)) / 60000);
                
                // Liquidez Estimada
                let liqClass = "liq-alta", liqTxt = "Alta Venda";
                if (d.tier >= 7 && d.q >= 3) { liqClass = "liq-baixa"; liqTxt = "Nicho/Lento"; }

                return { ...d, c_final, v_liq, lucro, roi, diff, liqClass, liqTxt };
            });

            if (ultimaCat === 'black') processados = processados.filter(p => p.d.includes('Black') && p.roi > 5);
            processados.sort((a, b) => b.roi - a.roi);

            let html = "";
            processados.forEach(d => {
                if (query && !d.n.toLowerCase().includes(query)) return;
                if (d.lucro <= 0) return;

                const isFav = favoritos.includes(d.id);
                const tClass = d.tier === 8 ? "t8" : (d.tier === 7 ? "t7" : (d.tier === 6 ? "t6" : ""));

                html += `<tr>
                    <td><span class="star ${isFav?'active':''}" onclick="toggleFav('${d.id}')">★</span></td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px">
                            <img src="https://render.albiononline.com/v1/item/${d.id}.png?quality=${d.q}" width="35">
                            <div>
                                <span class="tier-badge ${tClass}">${d.n}</span><br>
                                <span class="liquidez ${d.liqClass}">${d.liqTxt}</span>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span style="font-weight:bold; color:#cbd5e1">${d.o}</span>
                        <div class="recipe-table">
                            <div class="recipe-row"><span>Material/Custo:</span> <span class="recipe-val">${d.details}</span></div>
                            <div class="recipe-row"><span>Qualidade:</span> <span class="recipe-val">${Q_MAP[d.q]}</span></div>
                        </div>
                    </td>
                    <td><b style="${d.d.includes('Black') ? 'color:var(--gold)' : ''}">${d.d}</b></td>
                    <td style="color:#f87171">${d.c_final.toLocaleString()}</td>
                    <td style="color:#60a5fa">${d.v_liq.toLocaleString()}</td>
                    <td style="color:var(--accent); font-weight:bold;">+ ${d.lucro.toLocaleString()}</td>
                    <td style="font-weight:bold; font-size:1rem; color:${d.roi > 30 ? 'var(--gold)' : 'white'}">${d.roi}%</td>
                    <td style="font-size:0.7rem; color:gray">${d.diff}m</td>
                </tr>`;
            });
            document.getElementById('corpo').innerHTML = html;
        }

        window.onload = () => {
            updateFavSidebar();
            mudarCat('flip');
        };
    </script>
</body>
</html>
