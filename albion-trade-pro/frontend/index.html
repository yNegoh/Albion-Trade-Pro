<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
table { width:100%; margin-top:10px; border-collapse: collapse; }
th, td { padding:10px; text-align:center; }
th { background:#1e293b; cursor:pointer; }
input { margin:5px; }
.lucro { color:#22c55e; }
</style>
</head>

<body>

<h2>Albion Trade Pro</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="login()">Login</button>
<span id="status"></span>

<br><br>

<button onclick="buscar()">Atualizar</button>

<table>
<thead>
<tr>
<th onclick="ordenar('name')">Item</th>
<th>Compra</th>
<th>Venda</th>
<th onclick="ordenar('lucro')">Lucro</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let premium = false;

// LOGIN
async function login(){

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;

  const res = await fetch(API+"/login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({user,pass})
  });

  const data = await res.json();

  if(data.success){
    premium = data.premium;
    document.getElementById("status").innerText = "Logado!";
    buscar();
  } else {
    document.getElementById("status").innerText = "Erro login";
  }
}

// ENTER LOGIN
document.getElementById("pass").addEventListener("keypress", e=>{
  if(e.key==="Enter") login();
});

// BUSCAR
async function buscar(){

  const res = await fetch(API+"/scanner");
  dados = await res.json();

  if(!premium){
    dados = dados.slice(0,20);
  }

  render();
}

// RENDER
function render(){

  tabela.innerHTML="";

  dados.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${i.name}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td class="lucro">${i.lucro}</td>
    </tr>`;
  });
}

// ORDENAR
let asc=false;

function ordenar(campo){
  asc=!asc;
  dados.sort((a,b)=> asc ? a[campo]-b[campo] : b[campo]-a[campo]);
  render();
}

// INIT
buscar();

</script>

</body>
</html>
