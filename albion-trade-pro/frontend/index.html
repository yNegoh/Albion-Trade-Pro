<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
  background: #020617;
}

th, td {
  padding: 10px;
  text-align: center;
}

th {
  background: #1e293b;
}

tr:hover {
  background: #1e293b;
}

.lucro {
  color: #22c55e;
  font-weight: bold;
}
</style>
</head>

<body>

<header>Albion Trade Pro</header>

<div class="container">

<input id="user" placeholder="Seu nome">
<button onclick="login()">Login</button>
<button onclick="buscar()">Atualizar</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Lucro</th>
<th>%</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";
let token = localStorage.getItem("token") || "";

// LOGIN
async function login() {
  const username = document.getElementById("user").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username })
  });

  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);

  alert("Logado!");
}

// FORMATAR ITEM
function formatItem(item) {

  let tier = item.match(/T(\d)/)[1];
  let enchant = item.includes("@") ? "." + item.split("@")[1] : "";

  let nome = item.split("_").slice(1).join("_");

  const traducoes = {
    "2H_SWORD": "Espada Longa",
    "BAG": "Bolsa",
    "CAPE": "Capa",
    "WOOD": "Madeira",
    "STONE": "Pedra",
    "FIBER": "Fibra",
    "HIDE": "Couro",
    "ORE": "Minério",
    "PLANKS": "Tábuas",
    "METALBAR": "Barra de Metal",
    "LEATHER": "Couro Tratado",
    "CLOTH": "Tecido",
    "STONEBLOCK": "Bloco de Pedra",
    "POTION_HEAL": "Poção de Cura",
    "POTION_ENERGY": "Poção de Energia",
    "FOOD_PIE": "Torta",
    "FOOD_SALAD": "Salada"
  };

  for (let key in traducoes) {
    if (nome.includes(key)) {
      nome = traducoes[key];
    }
  }

  return `${nome} ${tier}${enchant}`;
}

// BUSCAR
async function buscar() {

  const res = await fetch(API + "/scanner", {
    headers: { Authorization: token }
  });

  const data = await res.json();

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  data.forEach(item => {
    tabela.innerHTML += `
      <tr>
        <td>${formatItem(item.item)}</td>
        <td>${item.buyCity}</td>
        <td>${item.sellCity}</td>
        <td class="lucro">${item.lucro}</td>
        <td class="lucro">${item.percentual}%</td>
      </tr>
    `;
  });
}

if (token) buscar();

</script>

</body>
</html>
