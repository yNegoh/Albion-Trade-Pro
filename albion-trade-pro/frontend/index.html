<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

.cards {
  display:flex;
  gap:10px;
  padding:10px;
}

.card {
  flex:1;
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  background:#334155;
}

.filters {
  padding:10px;
}

.filters input, .filters select {
  padding:8px;
  margin:5px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

th {
  background:#1e293b;
}

tr:hover {
  background:#1e293b;
}

.lucro { color:#22c55e; font-weight:bold; }
</style>
</head>

<body>

<header>
  <div>Albion Trade Pro</div>
  <div id="userInfo">Não logado</div>
</header>

<!-- CARDS -->
<div class="cards">

<div class="card" onclick="ordenar('lucro')">
<h3>🔥 Top Lucro</h3>
<div id="topLucro"></div>
</div>

<div class="card" onclick="ordenar('volume')">
<h3>📦 Mais Vendidos</h3>
<div id="topVolume"></div>
</div>

<div class="card" onclick="ordenar('score')">
<h3>🧠 Melhor Score</h3>
<div id="topScore"></div>
</div>

</div>

<!-- FILTROS -->
<div class="filters">

<input id="search" placeholder="Buscar item">

<select id="buyCity"></select>
<select id="sellCity"></select>

<input id="qty" type="number" value="1">

<button onclick="buscar()">Atualizar</button>

</div>

<!-- TABELA -->
<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Preço Compra</th>
<th>Preço Venda</th>
<th>Lucro</th>
<th>Total</th>
<th>Volume</th>
<th>Score</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let token = localStorage.getItem("token") || "";
let dados = [];
let ordemAtual = "score";

// FORMAT
function format(n){ return n.toLocaleString("pt-BR"); }

// ITEM
function formatItem(item){
  let tier = item.match(/T(\d)/)[1];
  let enchant = item.includes("@") ? "." + item.split("@")[1] : "";
  let base = item.split("_").slice(1).join("_");

  const nomes = {
    BAG:"Bolsa",
    CAPE:"Capa",
    ORE:"Minério",
    WOOD:"Madeira",
    STONE:"Pedra"
  };

  return `${nomes[base] || base} ${tier}${enchant}`;
}

// CIDADES
const cidades = ["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

function preencherCidades(){
  buyCity.innerHTML = `<option value="">Compra</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
  sellCity.innerHTML = `<option value="">Venda</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
}

// BUSCAR
async function buscar(){
  const res = await fetch(API+"/scanner",{ headers:{Authorization:token} });
  dados = await res.json();
  preencherCidades();
  ordenar(ordemAtual);
}

// ORDENAR
function ordenar(tipo){

  ordemAtual = tipo;

  if(tipo === "lucro"){
    dados.sort((a,b)=>b.lucro-a.lucro);
  }

  if(tipo === "volume"){
    dados.sort((a,b)=>b.volume-a.volume);
  }

  if(tipo === "score"){
    dados.sort((a,b)=>b.score-a.score);
  }

  render();
}

// RENDER
function render(){

  const search = searchInput.value.toLowerCase();
  const buy = buyCity.value;
  const sell = sellCity.value;
  const qty = parseInt(qtyInput.value) || 1;

  tabela.innerHTML = "";

  let filtrado = dados.filter(i =>
    i.item.toLowerCase().includes(search) &&
    (!buy || i.buyCity === buy) &&
    (!sell || i.sellCity === sell)
  );

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${format(i.buyPrice)}</td>
      <td>${format(i.sellPrice)}</td>
      <td class="lucro">${format(i.lucro)}</td>
      <td class="lucro">${format(i.lucro * qty)}</td>
      <td>${format(i.volume)}</td>
      <td>${format(i.score)}</td>
    </tr>`;
  });

  // DASHBOARD
  topLucro.innerHTML = dados.slice(0,3).map(i=>`${formatItem(i.item)} (${format(i.lucro)})`).join("<br>");
  topVolume.innerHTML = [...dados].sort((a,b)=>b.volume-a.volume).slice(0,3)
    .map(i=>`${formatItem(i.item)} (${format(i.volume)})`).join("<br>");
  topScore.innerHTML = dados.slice(0,3)
    .map(i=>`${formatItem(i.item)} (${format(i.score)})`).join("<br>");
}

// ELEMENTOS
const searchInput = document.getElementById("search");
const qtyInput = document.getElementById("qty");

searchInput.addEventListener("input", render);
buyCity.addEventListener("change", render);
sellCity.addEventListener("change", render);
qtyInput.addEventListener("input", render);

// INIT
if(token){
  buscar();
}

</script>

</body>
</html>
