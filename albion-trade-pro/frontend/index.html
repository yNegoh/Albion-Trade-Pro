<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; }

.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
  height:100vh;
}

.sidebar button {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  background:#1e293b;
  border:none;
  color:white;
  cursor:pointer;
}

.main {
  flex:1;
  padding:15px;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

input, select {
  padding:8px;
  margin:5px;
}

.cards {
  display:flex;
  gap:10px;
}

.card {
  flex:1;
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

table {
  width:100%;
  margin-top:10px;
}

th, td {
  padding:10px;
  text-align:center;
}

th { background:#1e293b; }

.lucro { color:#22c55e; }
</style>
</head>

<body>

<div class="sidebar">
  <h2>Albion Trade</h2>
  <button onclick="buscar()">Atualizar</button>
</div>

<div class="main">

<div class="topbar">
  <div id="userInfo">Não logado</div>

  <div id="loginArea">
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="cards">
  <div class="card" onclick="setOrder('lucro')">🔥 Top Lucro</div>
  <div class="card" onclick="setOrder('volume')">📦 Mais Vendidos</div>
  <div class="card" onclick="setOrder('score')">🧠 Melhor Score</div>
</div>

<input id="search" placeholder="Buscar item">
<select id="buyCity"></select>
<select id="sellCity"></select>
<input id="qty" type="number" value="1">

<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Preço Compra</th>
<th>Preço Venda</th>
<th>Lucro</th>
<th>Total</th>
<th>Volume</th>
<th>Score</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let ordem = "score";

// NOMES PT
const nomes = {
  BAG:"Bolsa",
  CAPE:"Capa",
  ORE:"Minério",
  WOOD:"Madeira",
  STONE:"Pedra"
};

// FORMAT ITEM
function formatItem(item){

  let tier = item.match(/T(\d)/)[1];
  let enchant = item.includes("@") ? "." + item.split("@")[1] : "";
  let base = item.split("_")[1];

  return `${nomes[base] || base} T${tier}${enchant}`;
}

// LOGIN
function login(){
  const u = user.value;
  const p = pass.value;

  if(u === "negoh" && p === "301309*Negoh"){
    localStorage.setItem("user", u);
    userInfo.innerText = "Logado como: " + u;
    loginArea.style.display = "none";
  } else {
    alert("Login inválido");
  }
}

// INIT USER
window.onload = () => {

  const u = localStorage.getItem("user");

  if(u){
    userInfo.innerText = "Logado como: " + u;
    loginArea.style.display = "none";
  }

  buscar();
};

// FORMAT
function format(n){ return n.toLocaleString("pt-BR"); }

// CIDADES
const cidades = ["Bridgewatch","Martlock","Lymhurst","Fort Sterling","Thetford","Caerleon","Black Market"];

function preencherCidades(){
  buyCity.innerHTML = `<option value="">Compra</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
  sellCity.innerHTML = `<option value="">Venda</option>` + cidades.map(c=>`<option>${c}</option>`).join("");
}

// BUSCAR
async function buscar(){

  const res = await fetch(API+"/scanner");
  dados = await res.json();

  preencherCidades();
  render();
}

// ORDEM
function setOrder(tipo){
  ordem = tipo;
  render();
}

// RENDER
function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const buy = buyCity.value;
  const sell = sellCity.value;
  const qty = parseInt(qty.value) || 1;

  let filtrado = dados.filter(i =>
    formatItem(i.item).toLowerCase().includes(search) &&
    (!buy || i.buyCity === buy) &&
    (!sell || i.sellCity === sell)
  );

  filtrado.sort((a,b)=>{
    if(ordem === "lucro") return b.lucro - a.lucro;
    if(ordem === "volume") return b.volume - a.volume;
    if(ordem === "score") return b.score - a.score;
  });

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${format(i.buyPrice)}</td>
      <td>${format(i.sellPrice)}</td>
      <td class="lucro">${format(i.lucro)}</td>
      <td class="lucro">${format(i.lucro * qty)}</td>
      <td>${format(i.volume)}</td>
      <td>${format(i.score)}</td>
    </tr>`;
  });
}

</script>

</body>
</html>
