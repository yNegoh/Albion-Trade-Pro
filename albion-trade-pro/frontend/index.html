<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ALLBion Traders Pro</title>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; }
        .header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 3px solid #22c55e; }
        .container { padding: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: #1e293b; padding: 15px; border-radius: 8px; }
        input, select { padding: 10px; border-radius: 5px; border: none; background: #334155; color: white; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #334155; color: #22c55e; }
        .lucro { color: #22c55e; font-weight: bold; }
        .btn { background: #22c55e; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .loading { text-align: center; padding: 20px; font-style: italic; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header">
    <h1>ALLBion Traders Pro <small style="font-size: 12px; color: #94a3b8;">Scanner de Elite</small></h1>
</div>

<div class="container">
    <div class="controls">
        <input type="text" id="search" placeholder="Buscar item (ex: Bag, Sword)..." oninput="render()">
        <select id="fOrigem" onchange="render()">
            <option value="">Cidade Origem: Todas</option>
        </select>
        <select id="fDestino" onchange="render()">
            <option value="">Cidade Destino: Todas</option>
        </select>
        <button class="btn" onclick="fetchData()">Atualizar Dados</button>
    </div>

    <div id="status" class="loading">Clique em Atualizar para buscar oportunidades...</div>

    <table id="tabela" style="display: none;">
        <thead>
            <tr>
                <th>Item</th>
                <th>Origem</th>
                <th>Destino</th>
                <th>Compra</th>
                <th>Venda (-6.5%)</th>
                <th>Lucro Líquido</th>
                <th>ROI</th>
            </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
    </table>
</div>

<script>
    // COLOQUE O LINK DO SEU RENDER AQUI ABAIXO
    const API_URL = "https://albion-trade-pro-ogaq.onrender.com"; 
    let todasOportunidades = [];

    async function fetchData() {
        const status = document.getElementById('status');
        status.innerText = "Buscando na API do Albion... Isso pode levar 20 segundos...";
        try {
            const res = await fetch(API_URL);
            todasOportunidades = await res.json();
            
            preencherCidades();
            render();
            status.style.display = "none";
            document.getElementById('tabela').style.display = "table";
        } catch (e) {
            status.innerText = "Erro ao conectar com o backend. Verifique se o Render está online.";
        }
    }

    function preencherCidades() {
        const origens = [...new Set(todasOportunidades.map(o => o.origem))];
        const destinos = [...new Set(todasOportunidades.map(o => o.destino))];
        
        const selO = document.getElementById('fOrigem');
        const selD = document.getElementById('fDestino');
        
        origens.forEach(c => selO.innerHTML += `<option value="${c}">${c}</option>`);
        destinos.forEach(c => selD.innerHTML += `<option value="${c}">${c}</option>`);
    }

    function formatMoney(v) {
        return v.toLocaleString('pt-BR') + " silver";
    }

    function render() {
        const busca = document.getElementById('search').value.toLowerCase();
        const fO = document.getElementById('fOrigem').value;
        const fD = document.getElementById('fDestino').value;
        
        const filtrados = todasOportunidades.filter(o => {
            const bateNome = o.item.toLowerCase().includes(busca);
            const bateOrigem = fO === "" || o.origem === fO;
            const bateDestino = fD === "" || o.destino === fD;
            return bateNome && bateOrigem && bateDestino;
        });

        const corpo = document.getElementById('corpoTabela');
        corpo.innerHTML = "";

        filtrados.slice(0, 50).forEach(o => {
            corpo.innerHTML += `
                <tr>
                    <td>${o.item.replace(/_/g, ' ')}</td>
                    <td>${o.origem}</td>
                    <td>${o.destino}</td>
                    <td>${formatMoney(o.preco_compra)}</td>
                    <td>${formatMoney(o.preco_venda)}</td>
                    <td class="lucro">${formatMoney(o.lucro)}</td>
                    <td>${o.roi}%</td>
                </tr>
            `;
        });
    }
</script>

</body>
</html>
