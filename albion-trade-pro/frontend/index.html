<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

.container { padding:20px; }

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

th {
  background:#1e293b;
}

select {
  width:100%;
  background:#0f172a;
  color:white;
  border:none;
}

.lucro { color:#22c55e; }
</style>
</head>

<body>

<div class="container">

<h2>Albion Trade Pro</h2>

<button onclick="buscar()">Atualizar</button>

<table>

<thead>
<tr>
<th>
Item<br>
<input id="fItem" placeholder="Buscar..." oninput="filtrar()">
</th>

<th>
Categoria<br>
<select id="fCategoria" onchange="filtrar()">
<option value="">Todos</option>
</select>
</th>

<th>
Compra<br>
<select id="fCompra" onchange="filtrar()">
<option value="">Todas</option>
</select>
</th>

<th>
Venda<br>
<select id="fVenda" onchange="filtrar()">
<option value="">Todas</option>
</select>
</th>

<th onclick="ordenar('lucro')">Lucro ⬍</th>
<th onclick="ordenar('volume')">Volume ⬍</th>
<th onclick="ordenar('score')">Score ⬍</th>

</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let filtrado = [];

async function buscar(){
  const res = await fetch(API+"/scanner");
  dados = await res.json();

  popularFiltros();
  filtrado = dados;
  render();
}

function popularFiltros(){

  const categorias = [...new Set(dados.map(i=>i.category))];
  const compras = [...new Set(dados.map(i=>i.buyCity))];
  const vendas = [...new Set(dados.map(i=>i.sellCity))];

  fCategoria.innerHTML = '<option value="">Todos</option>';
  categorias.forEach(c=>{
    fCategoria.innerHTML += `<option>${c}</option>`;
  });

  fCompra.innerHTML = '<option value="">Todas</option>';
  compras.forEach(c=>{
    fCompra.innerHTML += `<option>${c}</option>`;
  });

  fVenda.innerHTML = '<option value="">Todas</option>';
  vendas.forEach(c=>{
    fVenda.innerHTML += `<option>${c}</option>`;
  });
}

function filtrar(){

  const item = fItem.value.toLowerCase();
  const cat = fCategoria.value;
  const compra = fCompra.value;
  const venda = fVenda.value;

  filtrado = dados.filter(i =>
    i.name.toLowerCase().includes(item) &&
    (!cat || i.category === cat) &&
    (!compra || i.buyCity === compra) &&
    (!venda || i.sellCity === venda)
  );

  render();
}

function render(){

  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${i.name}</td>
      <td>${i.category}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td class="lucro">${i.lucro.toLocaleString()}</td>
      <td>${i.volume}</td>
      <td>${i.score}</td>
    </tr>`;
  });
}

let asc = false;

function ordenar(campo){

  asc = !asc;

  filtrado.sort((a,b)=>{
    return asc
      ? a[campo] - b[campo]
      : b[campo] - a[campo];
  });

  render();
}

buscar();

</script>

</body>
</html>
