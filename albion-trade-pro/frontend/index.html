<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { padding:20px; }

input, select {
  padding:8px;
  margin:5px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

th { background:#1e293b; }
tr:hover { background:#1e293b; }

.lucro { color:#22c55e; }
</style>
</head>

<body>

<div class="container">

<input id="user" placeholder="Nome">
<button onclick="login()">Login</button>

<br>

<input id="search" placeholder="Buscar item">
<select id="buyCity"></select>
<select id="sellCity"></select>

<input id="qty" type="number" placeholder="Qtd" value="1">

<button onclick="buscar()">Buscar</button>

<table>
<thead>
<tr>
<th>Item</th>
<th>Compra</th>
<th>Venda</th>
<th>Preço Compra</th>
<th>Preço Venda</th>
<th>Lucro Unit</th>
<th>Lucro Total</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";
let token = localStorage.getItem("token") || "";
let dados = [];

async function login(){
  const res = await fetch(API + "/login",{method:"POST"});
  const data = await res.json();
  token = data.token;
  localStorage.setItem("token", token);
}

function formatItem(i){
  return i.replace("_"," ");
}

function render(){

  const search = document.getElementById("search").value.toLowerCase();
  const buyCity = document.getElementById("buyCity").value;
  const sellCity = document.getElementById("sellCity").value;
  const qty = parseInt(document.getElementById("qty").value) || 1;

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  let filtrado = dados.filter(i => 
    i.item.toLowerCase().includes(search) &&
    (!buyCity || i.buyCity === buyCity) &&
    (!sellCity || i.sellCity === sellCity)
  );

  filtrado.forEach(i => {

    const lucroTotal = i.lucro * qty;

    tabela.innerHTML += `
    <tr>
      <td>${formatItem(i.item)}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td>${i.buyPrice}</td>
      <td>${i.sellPrice}</td>
      <td class="lucro">${i.lucro}</td>
      <td class="lucro">${lucroTotal}</td>
    </tr>`;
  });
}

async function buscar(){

  const res = await fetch(API + "/scanner", {
    headers:{ Authorization: token }
  });

  dados = await res.json();

  preencherCidades();
  render();
}

function preencherCidades(){

  const buys = [...new Set(dados.map(i => i.buyCity))];
  const sells = [...new Set(dados.map(i => i.sellCity))];

  document.getElementById("buyCity").innerHTML =
    `<option value="">Compra</option>` + buys.map(c=>`<option>${c}</option>`).join("");

  document.getElementById("sellCity").innerHTML =
    `<option value="">Venda</option>` + sells.map(c=>`<option>${c}</option>`).join("");
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("buyCity").addEventListener("change", render);
document.getElementById("sellCity").addEventListener("change", render);
document.getElementById("qty").addEventListener("input", render);

if(token) buscar();

</script>

</body>
</html>
