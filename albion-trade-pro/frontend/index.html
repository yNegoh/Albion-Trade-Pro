<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; margin:0; }

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#020617;
}

.card {
  background:#1e293b;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.flex { display:flex; }

table { width:100%; margin-top:20px; }

th,td { padding:10px; text-align:center; }

th { background:#1e293b; }

.lucro { color:#22c55e; }
</style>
</head>

<body>

<header>
  <div>Albion Trade Pro</div>
  <div id="userInfo">Não logado</div>
</header>

<div class="flex">

<div class="card">
<h3>Top Lucro</h3>
<div id="topLucro"></div>
</div>

<div class="card">
<h3>Mais Vendidos</h3>
<div id="topVolume"></div>
</div>

</div>

<div style="padding:20px">

<button onclick="buscar()">Atualizar</button>

<table>
<tr>
<th>Item</th>
<th>Lucro</th>
<th>Volume</th>
<th>Score</th>
</tr>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";
let token = localStorage.getItem("token") || "";

async function buscar(){

  const res = await fetch(API+"/scanner",{
    headers:{Authorization:token}
  });

  const data = await res.json();

  render(data);
}

function render(data){

  tabela.innerHTML = "";

  data.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td>${i.item}</td>
      <td class="lucro">${i.lucro}</td>
      <td>${i.volume}</td>
      <td>${i.score}</td>
    </tr>`;
  });

  // TOP LUCRO
  let topL = [...data].sort((a,b)=>b.lucro-a.lucro).slice(0,3);
  topLucro.innerHTML = topL.map(i=>`${i.item} (${i.lucro})`).join("<br>");

  // TOP VOLUME
  let topV = [...data].sort((a,b)=>b.volume-a.volume).slice(0,3);
  topVolume.innerHTML = topV.map(i=>`${i.item} (${i.volume})`).join("<br>");
}

buscar();

</script>

</body>
</html>
