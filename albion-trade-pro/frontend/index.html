<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Albion Trade Pro</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; display:flex; }

.sidebar {
  width:220px;
  background:#020617;
  padding:15px;
}

.sidebar h3 { margin-bottom:10px; }

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#1e293b;
  color:white;
  border:none;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

table {
  width:100%;
  margin-top:10px;
  border-collapse: collapse;
}

th, td {
  padding:10px;
  text-align:center;
}

th { background:#1e293b; cursor:pointer; }

input, select {
  width:100%;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
}

.lucro { color:#22c55e; }
.star { cursor:pointer; }

.autocomplete {
  position:absolute;
  background:#020617;
  border:1px solid #334155;
  max-height:150px;
  overflow:auto;
  width:200px;
}

.autocomplete div {
  padding:5px;
  cursor:pointer;
}

.autocomplete div:hover {
  background:#1e293b;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>Albion Trade</h3>
  <button onclick="mostrarTodos()">📊 Mercado</button>
  <button onclick="mostrarFavoritos()">⭐ Favoritos</button>
</div>

<div class="main">

<h2>Scanner</h2>

<div style="display:flex; gap:10px; flex-wrap:wrap;">

<div style="position:relative;">
<input id="fItem" placeholder="Buscar item...">
<div id="auto" class="autocomplete"></div>
</div>

<select id="fCategoria"></select>
<select id="fCompra"></select>
<select id="fVenda"></select>

<input id="fLucro" type="number" placeholder="Lucro mínimo">

<button onclick="buscar()">Atualizar</button>

</div>

<table>

<thead>
<tr>
<th>⭐</th>
<th onclick="ordenar('name')">Item ⬍</th>
<th onclick="ordenar('category')">Categoria ⬍</th>
<th>Compra</th>
<th>Venda</th>
<th onclick="ordenar('lucro')">Lucro ⬍</th>
<th onclick="ordenar('volume')">Volume ⬍</th>
<th onclick="ordenar('score')">Score ⬍</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const API = "https://albion-trade-pro-ogaq.onrender.com";

let dados = [];
let filtrado = [];
let favoritos = JSON.parse(localStorage.getItem("fav") || "[]");

const fItem = document.getElementById("fItem");
const auto = document.getElementById("auto");
const fCategoria = document.getElementById("fCategoria");
const fCompra = document.getElementById("fCompra");
const fVenda = document.getElementById("fVenda");
const fLucro = document.getElementById("fLucro");

fItem.addEventListener("input", autocomplete);
fCategoria.onchange = filtrar;
fCompra.onchange = filtrar;
fVenda.onchange = filtrar;
fLucro.oninput = filtrar;

// 🔥 BUSCAR
async function buscar(){
  const res = await fetch(API+"/scanner");
  dados = await res.json();

  salvarFiltros();
  carregarFiltros();

  popularFiltros();
  filtrado = [...dados];

  render();
}

// 🔥 AUTOCOMPLETE
function autocomplete(){
  const val = fItem.value.toLowerCase();
  auto.innerHTML = "";

  if(!val) return;

  const sugestoes = dados
    .map(i=>i.name)
    .filter((v,i,a)=>a.indexOf(v)===i)
    .filter(v=>v.toLowerCase().includes(val))
    .slice(0,10);

  sugestoes.forEach(s=>{
    const div = document.createElement("div");
    div.innerText = s;
    div.onclick = ()=>{
      fItem.value = s;
      auto.innerHTML = "";
      filtrar();
    };
    auto.appendChild(div);
  });
}

// 🔥 FAVORITOS
function toggleFav(item){
  if(favoritos.includes(item)){
    favoritos = favoritos.filter(f=>f!==item);
  } else {
    favoritos.push(item);
  }
  localStorage.setItem("fav", JSON.stringify(favoritos));
  render();
}

function mostrarFavoritos(){
  filtrado = dados.filter(i=>favoritos.includes(i.item));
  render();
}

function mostrarTodos(){
  filtrado = [...dados];
  render();
}

// 🔥 FILTRO
function filtrar(){

  const item = fItem.value.toLowerCase();
  const cat = fCategoria.value;
  const compra = fCompra.value;
  const venda = fVenda.value;
  const lucroMin = Number(fLucro.value) || 0;

  filtrado = dados.filter(i =>
    i.name.toLowerCase().includes(item) &&
    (!cat || i.category === cat) &&
    (!compra || i.buyCity === compra) &&
    (!venda || i.sellCity === venda) &&
    i.lucro >= lucroMin
  );

  render();
}

// 🔥 RENDER
function render(){
  tabela.innerHTML = "";

  filtrado.forEach(i=>{
    tabela.innerHTML += `
    <tr>
      <td class="star" onclick="toggleFav('${i.item}')">
        ${favoritos.includes(i.item) ? "⭐" : "☆"}
      </td>
      <td>${i.name}</td>
      <td>${i.category}</td>
      <td>${i.buyCity}</td>
      <td>${i.sellCity}</td>
      <td class="lucro">${i.lucro.toLocaleString()}</td>
      <td>${i.volume}</td>
      <td>${i.score}</td>
    </tr>`;
  });
}

// 🔥 ORDENAÇÃO
let asc = false;
function ordenar(campo){
  asc = !asc;
  filtrado.sort((a,b)=> asc ? a[campo]-b[campo] : b[campo]-a[campo]);
  render();
}

// 🔥 FILTROS
function popularFiltros(){

  function setOptions(el, list){
    el.innerHTML = '<option value="">Todos</option>';
    list.forEach(v=>{
      el.innerHTML += `<option>${v}</option>`;
    });
  }

  setOptions(fCategoria, [...new Set(dados.map(i=>i.category))]);
  setOptions(fCompra, [...new Set(dados.map(i=>i.buyCity))]);
  setOptions(fVenda, [...new Set(dados.map(i=>i.sellCity))]);
}

// 🔥 SALVAR FILTROS
function salvarFiltros(){
  localStorage.setItem("filtros", JSON.stringify({
    item:fItem.value,
    cat:fCategoria.value,
    compra:fCompra.value,
    venda:fVenda.value,
    lucro:fLucro.value
  }));
}

function carregarFiltros(){
  const f = JSON.parse(localStorage.getItem("filtros")||"{}");
  fItem.value = f.item||"";
  fCategoria.value = f.cat||"";
  fCompra.value = f.compra||"";
  fVenda.value = f.venda||"";
  fLucro.value = f.lucro||"";
}

// INIT
buscar();

</script>

</body>
</html>
