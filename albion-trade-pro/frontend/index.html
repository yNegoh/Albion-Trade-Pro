<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>Albion Trader Pro v1.4</title>
    <style>
        /* (Mantenha o CSS da v1.3 e adicione estes novos estilos) */
        .filter-bar { display: flex; gap: 20px; background: #0f172a; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid var(--border); font-size: 0.75rem; align-items: center; }
        .filter-group { display: flex; gap: 8px; align-items: center; border-right: 1px solid var(--border); padding-right: 15px; }
        .filter-group:last-child { border: none; }
        .filter-group label { color: var(--gold); font-weight: bold; }
        .check-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
        input[type="checkbox"] { cursor: pointer; accent-color: var(--accent); }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <h2 style="color:var(--accent);">Trader Pro <small style="display:block; font-size: 0.6rem; color:gray">v1.4 Advanced</small></h2>
            <button class="nav-item active" onclick="mudarCat('flip', this)">⚔️ Flip de Mercado</button>
            <button class="nav-item black-btn" onclick="mudarCat('black', this)">🏴 Black Market</button>
            <button class="nav-item" onclick="mudarCat('craft', this)">🛠️ Craft Geral</button>
            <button class="nav-item" onclick="mudarCat('refino', this)">🪵 Refino Recursos</button>
        </div>

        <div class="main">
            <!-- Ferramentas Principais -->
            <div class="top-tools">
                <div class="tool-group"><label>PREMIUM</label><input type="checkbox" id="checkPre" checked onchange="render()"></div>
                <div class="tool-group">
                    <label>RETORNO</label>
                    <select id="selRRR" onchange="render()" style="background:none; color:white; font-weight:bold;">
                        <option value="0">0%</option>
                        <option value="0.152" selected>15.2%</option>
                        <option value="0.437">43.7%</option>
                    </select>
                </div>
                <input type="text" id="fNome" placeholder="🔍 Filtrar item..." oninput="render()" style="background:var(--card); border:1px solid var(--border); color:white; padding:8px; border-radius:8px; width:180px;">
                <button onclick="mudarCat(ultimaCat)" style="background:var(--accent); color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; margin-left:auto;">🔄 ATUALIZAR</button>
            </div>

            <!-- BARRA DE FILTROS TIER E QUALIDADE (NOVO v1.4) -->
            <div class="filter-bar">
                <div class="filter-group">
                    <label>TIER:</label>
                    <div class="check-item"><input type="checkbox" class="fTier" value="4" checked onchange="render()"> T4</div>
                    <div class="check-item"><input type="checkbox" class="fTier" value="5" checked onchange="render()"> T5</div>
                    <div class="check-item"><input type="checkbox" class="fTier" value="6" checked onchange="render()"> T6</div>
                    <div class="check-item"><input type="checkbox" class="fTier" value="7" checked onchange="render()"> T7</div>
                    <div class="check-item"><input type="checkbox" class="fTier" value="8" checked onchange="render()"> T8</div>
                </div>
                <div class="filter-group">
                    <label>QUALIDADE:</label>
                    <div class="check-item"><input type="checkbox" class="fQual" value="1" checked onchange="render()"> Normal</div>
                    <div class="check-item"><input type="checkbox" class="fQual" value="2" checked onchange="render()"> Bom</div>
                    <div class="check-item"><input type="checkbox" class="fQual" value="3" checked onchange="render()"> Excepcional</div>
                    <div class="check-item"><input type="checkbox" class="fQual" value="4" checked onchange="render()"> Excelente</div>
                </div>
                <div id="status-msg" style="color: var(--accent); font-weight:bold; margin-left: auto;">Aguardando...</div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 220px;">Item / Qualidade</th>
                            <th>Origem / Receita
                                <select id="fOrigem" class="header-filter" onchange="render()">
                                    <option value="">Todas</option><option value="Martlock">Martlock</option><option value="Lymhurst">Lymhurst</option><option value="Bridgewatch">Bridgewatch</option><option value="FortSterling">Fort Sterling</option><option value="Thetford">Thetford</option><option value="Caerleon">Caerleon</option>
                                </select>
                            </th>
                            <th>Destino
                                <select id="fDestino" class="header-filter" onchange="render()">
                                    <option value="">Todos</option><option value="Black Market">Black Market</option><option value="Caerleon">Caerleon</option><option value="Martlock">Martlock</option><option value="Lymhurst">Lymhurst</option><option value="Bridgewatch">Bridgewatch</option><option value="FortSterling">Fort Sterling</option><option value="Thetford">Thetford</option>
                                </select>
                            </th>
                            <th onclick="ordenar('c_final')">Preço Compra</th>
                            <th onclick="ordenar('v_liq')">Venda Líquida</th>
                            <th onclick="ordenar('lucro')">Lucro Silver</th>
                            <th onclick="ordenar('roi')" style="color:var(--gold)">ROI % ↓</th>
                            <th>Idade</th>
                        </tr>
                    </thead>
                    <tbody id="corpo"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // ... (mantenha as variáveis globais API, Q_MAP, dados, etc)

        function render(apenasTabela = false) {
            const isPre = document.getElementById('checkPre').checked;
            const rrr = parseFloat(document.getElementById('selRRR').value);
            const query = document.getElementById('fNome').value.toLowerCase();
            const fOrigem = document.getElementById('fOrigem').value;
            const fDestino = document.getElementById('fDestino').value;
            const taxaMkt = isPre ? 0.065 : 0.105;
            
            // Pega Tiers e Qualidades selecionados
            const tiersSelecionados = Array.from(document.querySelectorAll('.fTier:checked')).map(cb => parseInt(cb.value));
            const qualsSelecionadas = Array.from(document.querySelectorAll('.fQual:checked')).map(cb => parseInt(cb.value));

            let processados = dados.map(d => {
                const c_final = Math.round((ultimaCat === 'flip' || ultimaCat === 'black' ? d.c_bruto : d.c_bruto * (1 - rrr)));
                const v_liq = Math.round(d.v_bruto * (1 - taxaMkt));
                const lucro = v_liq - c_final;
                const roi = parseFloat(((lucro / c_final) * 100).toFixed(1));
                const diff = Math.floor((Date.now() - new Date(d.t)) / 60000);
                
                let precoUnitario = 0;
                if (ultimaCat === 'craft' || ultimaCat === 'refino') {
                    const match = d.details.match(/\d+/);
                    const qtd = match ? parseInt(match[0]) : 1;
                    precoUnitario = Math.round(d.c_bruto / qtd);
                }
                return { ...d, c_final, v_liq, lucro, roi, diff, precoUnitario };
            });

            // APLICAÇÃO DOS FILTROS
            processados = processados.filter(p => {
                const matchTier = tiersSelecionados.includes(p.tier);
                const matchQual = qualsSelecionadas.includes(p.q);
                const matchQuery = !query || p.n.toLowerCase().includes(query);
                const matchOrigem = !fOrigem || p.o === fOrigem;
                const matchDestino = !fDestino || p.d === fDestino;
                const matchLucro = p.lucro > 0;
                
                let matchCat = true;
                if (ultimaCat === 'black') matchCat = (p.d.includes('Black') || p.d === 'Caerleon') && p.roi > 3;

                return matchTier && matchQual && matchQuery && matchOrigem && matchDestino && matchLucro && matchCat;
            });

            if (!apenasTabela) processados.sort((a, b) => b.roi - a.roi);

            // Geração de HTML (Mantenha igual à v1.3)
            let html = "";
            processados.forEach(d => {
                // ... (mantenha o código de geração de linhas da tabela da v1.3)
            });
            document.getElementById('corpo').innerHTML = html;
        }
        // ... (mantenha as funções mudarCat e ordenar)
    </script>
</body>
</html>
